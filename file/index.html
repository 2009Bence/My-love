<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jó reggelt</title>

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  background: radial-gradient(circle at top, #2a001f, #0b0008);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial;
  color: white;
}

.container {
  text-align: center;
  max-width: 600px;
  padding: 20px;
  z-index: 2;
}

h1 {
  font-size: 36px;
  margin-bottom: 20px;
}

p {
  font-size: 18px;
  opacity: 0.9;
  line-height: 1.5;
  white-space: pre-line;
}

.rose {
  position: absolute;
  top: -50px;
  font-size: 24px;
  animation: fall linear forwards;
  opacity: 0.8;
}

@keyframes fall {
  to {
    transform: translateY(110vh);
  }
}

.glow {
  position: absolute;
  width: 300px;
  height: 300px;
  background: rgba(255, 0, 120, 0.15);
  border-radius: 50%;
  filter: blur(80px);
  animation: pulse 4s infinite;
}

@keyframes pulse {
  0%,100% { transform: scale(1); opacity: 0.4; }
  50% { transform: scale(1.3); opacity: 0.7; }
}
</style>
</head>

<body>

<div class="glow"></div>

<div class="container">
  <h1 id="title"></h1>
  <p id="msg"></p>
</div>

<script>
const title = "Jó reggelt 🌹";

const msg = 
`Remélem nyugodtan ébredtél.
Nem kell ma semmit siettetni.

Ha bármi nehéz jön, nem egyedül kell elbírnod fejben.
Csak gondoltam rád, ennyi.`;

// gépelés
let i = 0;
let j = 0;

function typeTitle(){
  if(i < title.length){
    document.getElementById("title").innerHTML += title[i++];
    setTimeout(typeTitle, 70);
  } else {
    typeMsg();
  }
}

function typeMsg(){
  if(j < msg.length){
    document.getElementById("msg").innerHTML += msg[j++];
    setTimeout(typeMsg, 25);
  }
}

// rózsa esés
function spawnRose(){
  const rose = document.createElement("div");
  rose.classList.add("rose");
  rose.innerText = "🌹";

  rose.style.left = Math.random() * window.innerWidth + "px";
  rose.style.animationDuration = (3 + Math.random() * 5) + "s";

  document.body.appendChild(rose);

  setTimeout(() => {
    rose.remove();
  }, 8000);
}

setInterval(spawnRose, 300);

window.onload = typeTitle;

// click interakció
document.body.addEventListener("click", () => {
  for(let k = 0; k < 10; k++){
    setTimeout(spawnRose, k * 50);
  }
});
</script>

</body>
</html>
